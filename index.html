<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Laboratório Flexbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Laboratório Flexbox</h1>

  <section>
    <h2>Container com 3 caixas</h2>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>
  </section>

  <section>
    <h2>Container com 6 caixas</h2>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </section>

</body>
</html>
